<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { margin: 0; font-family: "Inter", system-ui, sans-serif; background: #0b0d12; color: #e7eaf0; }
      .head { padding: 14px 16px; border-bottom: 1px solid #232838; display: flex; align-items: center; justify-content: space-between; }
      .title { font-weight: 700; }
      .sub { color: #8b93a7; font-size: 11px; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
      .wrap { padding: 12px 14px; }
      .label { color: #8b93a7; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; margin: 4px 0 8px; }
      .card { background: #12151d; border: 1px solid #232838; border-radius: 10px; padding: 11px; margin-bottom: 10px; }
      .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 5px; margin-bottom: 6px; }
      .conf { font-weight: 700; font-size: 12px; float: right; }
      .body { font-size: 13px; line-height: 1.45; }
      .why { margin-top: 8px; border-top: 1px solid #232838; padding-top: 7px; }
      .why li { font-size: 11px; color: #8b93a7; margin-bottom: 2px; }
      .empty { color: #8b93a7; font-size: 12px; text-align: center; padding: 30px 10px; }
      a { color: #117dff; font-size: 11px; }
    </style>
  </head>
  <body>
    <div class="head">
      <div><div class="title">ContextOS</div><div class="sub">Context follows you</div></div>
      <div class="sub"><span id="dot" class="dot"></span><span id="state"></span></div>
    </div>
    <div class="wrap">
      <div class="label">Ambient context for this page</div>
      <div id="list"><div class="empty">Browse to a page — related memories appear here.</div></div>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
